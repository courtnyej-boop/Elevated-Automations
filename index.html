<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elevated Automations — AI Agent Army</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Raleway:wght@100;200;300;400&family=JetBrains+Mono:wght@300;400;500&family=Cormorant+Garamond:ital,wght@1,300&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#060606;
  --surface:#0d0d0d;
  --surface2:#141414;
  --y:#FFD600;
  --y2:rgba(255,214,0,0.08);
  --text:#F5F0E8;
  --muted:rgba(245,240,232,0.45);
  --muted2:rgba(245,240,232,0.2);
  --border:rgba(255,214,0,0.1);
  --border2:rgba(255,214,0,0.25);
}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:'Raleway',sans-serif;font-weight:300;overflow-x:hidden;cursor:none;}
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(255,214,0,0.012) 2px,rgba(255,214,0,0.012) 4px);pointer-events:none;z-index:9997;}

/* CURSOR */
.cursor{position:fixed;width:6px;height:6px;background:var(--y);border-radius:50%;pointer-events:none;z-index:9999;box-shadow:0 0 10px var(--y);}
.cursor-ring{position:fixed;width:28px;height:28px;border:1px solid rgba(255,214,0,0.5);border-radius:50%;pointer-events:none;z-index:9998;transition:all 0.12s ease;}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:18px 48px;display:flex;align-items:center;justify-content:space-between;}
nav::before{content:'';position:absolute;inset:0;background:rgba(6,6,6,0.9);backdrop-filter:blur(24px);border-bottom:1px solid var(--border);}
.nav-brand{position:relative;z-index:1;display:flex;align-items:center;gap:10px;}
.nav-dot{width:7px;height:7px;border-radius:50%;background:var(--y);box-shadow:0 0 8px var(--y);animation:blink 2s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0.2;}}
.nav-wordmark{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:400;letter-spacing:3px;color:var(--text);text-transform:uppercase;}
.nav-links{position:relative;z-index:1;display:flex;align-items:center;gap:36px;}
.nav-links a{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);text-decoration:none;transition:color 0.3s;}
.nav-links a:hover{color:var(--y);}
.nav-cta{color:var(--y);font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:3px;text-transform:uppercase;padding:10px 22px;border:1px solid var(--border2);cursor:none;text-decoration:none;transition:all 0.2s;background:rgba(255,214,0,0.04);}
.nav-cta:hover{background:rgba(255,214,0,0.1);box-shadow:0 0 20px rgba(255,214,0,0.15);}
.nav-ham{display:none;flex-direction:column;gap:5px;background:none;border:none;padding:4px;position:relative;z-index:2;cursor:pointer;}
.nav-ham span{display:block;width:22px;height:1px;background:var(--y);transition:all 0.3s;}

/* HERO */
#home{min-height:100vh;display:flex;flex-direction:column;align-items:flex-start;justify-content:center;padding:120px 48px 80px;position:relative;overflow:hidden;}
.hero-grid-bg{position:absolute;inset:0;background-image:linear-gradient(rgba(255,214,0,0.035) 1px,transparent 1px),linear-gradient(90deg,rgba(255,214,0,0.035) 1px,transparent 1px);background-size:52px 52px;}
.hero-radial{position:absolute;inset:0;background:radial-gradient(ellipse at 65% 50%,rgba(255,214,0,0.07) 0%,transparent 55%),radial-gradient(ellipse at 15% 80%,rgba(255,214,0,0.04) 0%,transparent 40%);}
.hero-corner-ring{position:absolute;top:50%;right:40px;transform:translateY(-50%);width:460px;height:460px;border:1px solid rgba(255,214,0,0.07);border-radius:50%;display:flex;align-items:center;justify-content:center;pointer-events:none;}
.hero-corner-ring::before{content:'';position:absolute;width:340px;height:340px;border:1px solid rgba(255,214,0,0.05);border-radius:50%;}
.hero-corner-ring::after{content:'';position:absolute;width:220px;height:220px;border:1px solid rgba(255,214,0,0.08);border-radius:50%;animation:spin 18s linear infinite;}
@keyframes spin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
.ring-center{width:72px;height:72px;border:1px solid var(--border2);border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:1px;color:var(--y);text-align:center;background:rgba(255,214,0,0.04);}
.hero-hud{position:absolute;right:520px;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;gap:20px;}
.hud-row{display:flex;flex-direction:column;gap:5px;text-align:right;}
.hud-val{font-family:'JetBrains Mono',monospace;font-size:28px;color:var(--y);line-height:1;}
.hud-lbl{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:3px;text-transform:uppercase;color:var(--muted2);}
.hud-bar{width:100px;height:1px;background:rgba(255,214,0,0.1);margin-left:auto;margin-top:5px;overflow:hidden;}
.hud-fill{height:100%;background:var(--y);animation:barFill 1.5s ease-out forwards;width:0;}
@keyframes barFill{to{width:var(--w,80%);}}
.hero-tag{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:5px;text-transform:uppercase;color:var(--y);margin-bottom:24px;opacity:0;animation:fadeUp 0.6s 0.3s forwards;display:flex;align-items:center;gap:12px;}
.hero-tag::before{content:'';width:28px;height:1px;background:var(--y);}
.hero-title{margin-bottom:44px;opacity:0;animation:fadeUp 0.7s 0.6s forwards;}
.hero-desc{font-size:15px;line-height:1.9;color:var(--muted);max-width:500px;margin-bottom:48px;opacity:0;animation:fadeUp 0.7s 1s forwards;}
.hero-btns{display:flex;gap:16px;opacity:0;animation:fadeUp 0.7s 1.2s forwards;}
.btn-y{background:var(--y);color:var(--bg);font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:4px;text-transform:uppercase;padding:14px 32px;border:none;cursor:none;text-decoration:none;display:inline-block;transition:box-shadow 0.2s;}
.btn-y:hover{box-shadow:0 0 28px rgba(255,214,0,0.4);}
.btn-ghost{background:transparent;color:var(--muted);font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:4px;text-transform:uppercase;padding:14px 32px;border:1px solid rgba(245,240,232,0.12);cursor:none;text-decoration:none;display:inline-block;transition:all 0.2s;}
.btn-ghost:hover{border-color:var(--y);color:var(--y);}
.status-strip{position:absolute;bottom:0;left:0;right:0;padding:12px 48px;border-top:1px solid var(--border);background:rgba(6,6,6,0.7);backdrop-filter:blur(10px);display:flex;align-items:center;gap:28px;overflow:hidden;}
.s-item{display:flex;align-items:center;gap:7px;font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--muted2);white-space:nowrap;}
.s-dot{width:4px;height:4px;border-radius:50%;background:var(--y);box-shadow:0 0 5px var(--y);}
.s-dot.dim{background:rgba(255,214,0,0.3);box-shadow:none;}
.s-ticker{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:2px;color:rgba(245,240,232,0.15);}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}

/* SECTION */
.section{padding:120px 48px;}
.sec-eyebrow{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:5px;text-transform:uppercase;color:var(--y);margin-bottom:14px;display:flex;align-items:center;gap:10px;}
.sec-eyebrow::before{content:'';width:20px;height:1px;background:var(--y);}
.sec-title{font-family:'Raleway',sans-serif;font-weight:100;font-size:50px;letter-spacing:1px;color:var(--text);line-height:1.1;margin-bottom:64px;}
.sec-title em{font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:300;color:var(--y);}

/* SERVICES */
#services{background:var(--surface);}
.svc-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border);}
.svc-card{background:var(--surface);padding:40px 32px;position:relative;overflow:hidden;transition:background 0.3s;}
.svc-card::after{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--y),transparent);transform:scaleX(0);transition:transform 0.4s;}
.svc-card:hover{background:var(--surface2);}
.svc-card:hover::after{transform:scaleX(1);}
.svc-num{font-family:'JetBrains Mono',monospace;font-size:9px;color:rgba(255,214,0,0.35);letter-spacing:2px;margin-bottom:24px;}
.svc-icon{width:40px;height:40px;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;color:var(--y);font-size:16px;margin-bottom:18px;transition:border-color 0.3s,box-shadow 0.3s;}
.svc-card:hover .svc-icon{border-color:var(--y);box-shadow:0 0 14px rgba(255,214,0,0.12);}
.svc-name{font-family:'Raleway',sans-serif;font-weight:300;font-size:13px;letter-spacing:3px;text-transform:uppercase;color:var(--text);margin-bottom:12px;}
.svc-desc{font-size:12px;line-height:1.9;color:var(--muted);}
.svc-tag{margin-top:18px;font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:2px;color:rgba(255,214,0,0.45);display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.svc-tag span::before{content:'▸ ';color:var(--y);}

/* PROCESS */
#process{background:var(--bg);}
.proc-layout{display:grid;grid-template-columns:1fr 1fr;gap:80px;align-items:start;}
.proc-steps{display:flex;flex-direction:column;}
.pstep{display:flex;gap:20px;padding:28px 0;border-bottom:1px solid var(--border);}
.pstep:last-child{border-bottom:none;}
.pstep-n{font-family:'JetBrains Mono',monospace;font-size:26px;color:rgba(255,214,0,0.12);line-height:1;flex-shrink:0;width:44px;transition:color 0.3s;}
.pstep:hover .pstep-n{color:var(--y);}
.pstep-name{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--y);margin-bottom:7px;}
.pstep-desc{font-size:12px;line-height:1.8;color:var(--muted);}
.terminal{background:var(--surface);border:1px solid var(--border);}
.term-bar{padding:11px 14px;background:var(--surface2);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:7px;}
.tdot{width:7px;height:7px;border-radius:50%;}
.td1{background:#ff3355;}.td2{background:#ffaa00;}.td3{background:var(--y);}
.term-title{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:2px;color:var(--muted2);margin-left:6px;}
.term-body{padding:20px;display:flex;flex-direction:column;gap:8px;}
.tl{font-family:'JetBrains Mono',monospace;font-size:11px;line-height:1.7;color:var(--muted);}
.tl .pr{color:var(--y);}
.tl .cmd{color:var(--text);}
.tl .ok{color:#00ff88;}
.tl .dim{color:rgba(245,240,232,0.2);}
.tl .hi{color:#a78bfa;}
.cblink{display:inline-block;width:7px;height:12px;background:var(--y);animation:cb 1s infinite;vertical-align:middle;}
@keyframes cb{0%,100%{opacity:1;}50%{opacity:0;}}

/* PRICING */
#pricing{background:var(--surface);}
.price-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border);}
.price-card{background:var(--surface);padding:44px 32px;position:relative;}
.price-card.feat{background:linear-gradient(135deg,rgba(255,214,0,0.05),rgba(255,214,0,0.02));}
.price-card.feat::before{content:'';position:absolute;inset:0;border:1px solid var(--border2);pointer-events:none;}
.plan-badge{position:absolute;top:18px;right:18px;background:rgba(255,214,0,0.08);color:var(--y);font-family:'JetBrains Mono',monospace;font-size:7px;letter-spacing:3px;text-transform:uppercase;padding:4px 10px;border:1px solid var(--border);}
.plan-tier{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:5px;text-transform:uppercase;color:var(--muted2);margin-bottom:24px;}
.plan-p{font-family:'Raleway',sans-serif;font-weight:100;font-size:60px;color:var(--text);line-height:1;letter-spacing:-2px;}
.plan-p sup{font-size:24px;color:var(--muted2);font-weight:300;vertical-align:top;margin-top:8px;display:inline-block;}
.plan-mo{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:3px;color:var(--muted2);margin-bottom:28px;}
.plan-div{height:1px;background:var(--border);margin-bottom:24px;}
.plan-feats{display:flex;flex-direction:column;gap:11px;margin-bottom:36px;}
.plan-feat{display:flex;align-items:flex-start;gap:9px;font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:1px;color:var(--muted);line-height:1.5;}
.pf-check{color:var(--y);flex-shrink:0;}
.plan-btn{width:100%;padding:12px;font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:4px;text-transform:uppercase;cursor:none;transition:all 0.2s;border:1px solid var(--border2);background:transparent;color:var(--y);text-decoration:none;display:block;text-align:center;}
.plan-btn:hover{background:rgba(255,214,0,0.06);box-shadow:0 0 16px rgba(255,214,0,0.1);}
.price-card.feat .plan-btn{background:var(--y);color:var(--bg);border-color:var(--y);}
.price-card.feat .plan-btn:hover{box-shadow:0 0 28px rgba(255,214,0,0.35);}

/* SIGNUP */
#signup{background:var(--bg);position:relative;overflow:hidden;}
#signup::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 75% 50%,rgba(255,214,0,0.04) 0%,transparent 55%);}
.su-layout{display:grid;grid-template-columns:1fr 1fr;gap:100px;align-items:center;position:relative;z-index:1;}
.su-feats{display:flex;flex-direction:column;gap:14px;margin-top:36px;}
.su-feat{display:flex;align-items:center;gap:10px;font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);}
.su-dot{width:4px;height:4px;border-radius:50%;background:var(--y);box-shadow:0 0 5px var(--y);flex-shrink:0;}
.su-form{background:var(--surface);border:1px solid var(--border);padding:36px;}
.form-hd{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:4px;text-transform:uppercase;color:var(--y);margin-bottom:24px;display:flex;align-items:center;gap:6px;}
.form-hd::before{content:'>';}
.form-fs{display:flex;flex-direction:column;gap:14px;}
.form-f{display:flex;flex-direction:column;gap:5px;}
.form-lbl{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:3px;text-transform:uppercase;color:var(--muted2);}
.form-inp{background:var(--surface2);border:1px solid rgba(245,240,232,0.07);padding:11px 13px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:11px;outline:none;transition:border-color 0.2s;width:100%;}
.form-inp:focus{border-color:var(--border2);}
.form-inp::placeholder{color:var(--muted2);}
.form-sel{background:var(--surface2);border:1px solid rgba(245,240,232,0.07);padding:11px 13px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:11px;outline:none;appearance:none;width:100%;}
.form-sel option{background:var(--surface);}
.form-sub{width:100%;background:var(--y);color:var(--bg);font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:4px;text-transform:uppercase;padding:13px;border:none;cursor:pointer;margin-top:6px;transition:box-shadow 0.2s;}
.form-sub:hover{box-shadow:0 0 24px rgba(255,214,0,0.4);}

/* FOOTER */
footer{padding:36px 48px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--surface);}
.ft-brand{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:3px;color:var(--muted2);display:flex;align-items:center;gap:8px;}
.ft-links{display:flex;gap:24px;}
.ft-links a{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:3px;text-transform:uppercase;color:var(--muted2);text-decoration:none;transition:color 0.2s;}
.ft-links a:hover{color:var(--y);}
.ft-copy{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:1px;color:rgba(245,240,232,0.12);}

/* REVEAL */
.reveal{opacity:0;transform:translateY(18px);transition:opacity 0.7s ease,transform 0.7s ease;}
.reveal.visible{opacity:1;transform:translateY(0);}

/* ══════════════════════════════════════
   MOBILE RESPONSIVE
══════════════════════════════════════ */
@media(max-width:768px){

  /* Cursor off on touch */
  .cursor,.cursor-ring{display:none;}
  body{cursor:auto;}
  a,button{cursor:pointer;}
  .btn-y,.btn-ghost,.nav-cta,.plan-btn,.form-sub{cursor:pointer;}

  /* NAV */
  nav{padding:14px 20px;}
  .nav-ham{display:flex;}
  .nav-links{
    display:none;
    flex-direction:column;
    gap:0;
    position:absolute;
    top:100%;left:0;right:0;
    background:rgba(6,6,6,0.97);
    backdrop-filter:blur(24px);
    border-bottom:1px solid var(--border);
    padding:8px 0 16px;
    z-index:1;
  }
  .nav-links.open{display:flex;}
  .nav-links a{
    padding:14px 24px;
    font-size:10px;
    border-bottom:1px solid var(--border);
    color:var(--muted);
  }
  .nav-cta{
    margin:12px 20px 0;
    text-align:center;
    padding:12px;
    font-size:9px;
  }

  /* HERO */
  #home{padding:90px 20px 90px;min-height:100vh;justify-content:flex-start;padding-top:100px;}
  .hero-corner-ring{display:none;}
  .hero-hud{
    position:relative;
    right:auto;top:auto;
    transform:none;
    flex-direction:row;
    justify-content:space-between;
    width:100%;
    margin-bottom:28px;
    padding:14px 16px;
    background:rgba(255,214,0,0.03);
    border:1px solid var(--border);
    order:-1;
    gap:0;
  }
  .hud-row{text-align:center;flex:1;}
  .hud-val{font-size:18px;}
  .hud-lbl{font-size:7px;letter-spacing:1px;}
  .hud-bar{width:40px;margin:4px auto 0;}
  .hero-tag{font-size:7px;letter-spacing:2px;margin-bottom:16px;}
  .hero-title{margin-bottom:28px;}
  .hero-title svg{width:100%;height:auto;max-width:320px;}
  .hero-desc{font-size:13px;line-height:1.8;max-width:100%;margin-bottom:32px;}
  .hero-btns{flex-direction:column;gap:10px;width:100%;}
  .btn-y,.btn-ghost{text-align:center;padding:14px 20px;font-size:9px;width:100%;}
  .status-strip{padding:10px 16px;gap:10px;flex-wrap:wrap;position:relative;}
  .s-item{font-size:7px;letter-spacing:1px;}
  .s-ticker{display:none;}

  /* SECTIONS */
  .section{padding:64px 20px;}
  .sec-title{font-size:32px;margin-bottom:36px;line-height:1.15;}

  /* SERVICES */
  .svc-grid{grid-template-columns:1fr;}
  .svc-card{padding:28px 20px;}
  .svc-name{font-size:12px;}

  /* PROCESS */
  .proc-layout{grid-template-columns:1fr;gap:40px;}
  .terminal{display:none;}
  .pstep{gap:14px;padding:20px 0;}
  .pstep-n{font-size:20px;width:36px;}

  /* PRICING */
  .price-grid{grid-template-columns:1fr;}
  .price-card{padding:32px 20px;}
  .plan-p{font-size:48px;}
  .plan-badge{font-size:6px;padding:3px 8px;}

  /* SIGNUP */
  .su-layout{grid-template-columns:1fr;gap:36px;}
  .su-form{padding:24px 18px;}
  .su-feats{gap:10px;}

  /* FOOTER */
  footer{
    flex-direction:column;
    align-items:flex-start;
    gap:18px;
    padding:28px 20px;
  }
  .ft-links{flex-wrap:wrap;gap:14px;}
}

@media(max-width:400px){
  .hero-hud{flex-direction:column;gap:12px;}
  .hud-row{text-align:left;flex:none;}
  .hud-bar{margin:4px 0 0;}
  .sec-title{font-size:28px;}
}
</style>
</head>
<body>

<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursorRing"></div>

<!-- NAV -->
<nav>
  <div class="nav-brand">
    <div class="nav-dot"></div>
    <div class="nav-wordmark">Elevated Automations</div>
  </div>
  <div class="nav-links" id="navLinks">
    <a href="#services">Services</a>
    <a href="#process">Process</a>
    <a href="#pricing">Pricing</a>
    <a href="https://calendly.com/elevauto/free-strategy-call" target="_blank" class="nav-cta">[ Deploy Army ]</a>
  </div>
  <button class="nav-ham" id="navHam" aria-label="Menu">
    <span></span><span></span><span></span>
  </button>
</nav>

<!-- HERO -->
<section id="home">
  <div class="hero-grid-bg"></div>
  <div class="hero-radial"></div>
  <div class="hero-corner-ring">
    <div class="ring-center">ARMY<br>ONLINE</div>
  </div>

  <div class="hero-hud">
    <div class="hud-row">
      <div class="hud-val">50+</div>
